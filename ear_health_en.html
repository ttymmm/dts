<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hearing Health Assessment</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f7fa;
            padding: 40px;
        }
        .container {
            max-width: 500px;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: #eef;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🎧 Hearing Health Assessment</h2>

    <label>Age</label>
    <input type="number" id="age">

    <label>Daily Headphone Usage (hours)</label>
    <input type="number" id="hours" step="0.1">

    <label>Volume (0-100)</label>
    <input type="number" id="volume">

    <label>Environment</label>
    <select id="env">
        <option value="0">Quiet</option>
        <option value="1">Noisy</option>
    </select>

    <label>Continuous Use Over 1 Hour</label>
    <select id="continuous">
        <option value="0">No</option>
        <option value="1">Yes</option>
    </select>

    <button onclick="calculate()">Start Assessment</button>

    <div class="result" id="result" style="display:none;"></div>
</div>

<script>
function calculate() {
    let age = parseFloat(document.getElementById("age").value);
    let hours = parseFloat(document.getElementById("hours").value);
    let volume = parseFloat(document.getElementById("volume").value);
    let env = parseInt(document.getElementById("env").value);
    let continuous = parseInt(document.getElementById("continuous").value);

    if (isNaN(age) || isNaN(hours) || isNaN(volume)) {
        alert("Please fill in all fields");
        return;
    }

    let score = 
        0.4 * hours +
        0.3 * (volume / 100) +
        0.2 * env +
        0.1 * continuous;

    let k = 5;
    let extra_age = Math.min(score * k, 15);
    let ear_age = (age + extra_age).toFixed(1);

    let level = "";
    if (score < 1) {
        level = "Low Risk";
    } else if (score < 2) {
        level = "Moderate Risk";
    } else {
        level = "High Risk";
    }

    let advice = [];
    if (hours > 2) advice.push("Reduce daily usage time (recommended ≤2 hours)");
    if (volume > 60) advice.push("Keep volume below 60%");
    if (continuous === 1) advice.push("Take a 10-minute break every hour");
    if (env === 1) advice.push("Use noise-canceling headphones in noisy environments");

    if (advice.length === 0) {
        advice.push("Your habits are healthy, keep it up 👍");
    }

    let resultDiv = document.getElementById("result");
    resultDiv.style.display = "block";
    resultDiv.innerHTML = `
        <b>Ear Age:</b> ${ear_age} (Actual Age: ${age})<br><br>
        <b>Risk Level:</b> ${level}<br><br>
        <b>Risk Score:</b> ${score.toFixed(2)}<br><br>
        <b>Advice:</b><br>${advice.join("<br>")}
    `;
}
</script>

</body>
</html>
